<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>飞机大战</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top, #0d1b3d, #050814 70%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .wrap { text-align: center; }
    h1 { margin: 0 0 10px; font-size: 28px; }
    p { margin: 6px 0 14px; color: #b8c2ff; }
    canvas {
      border: 2px solid rgba(255,255,255,.18);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
      background: linear-gradient(180deg, #091224, #04070f);
      max-width: calc(100vw - 24px);
      max-height: calc(100vh - 120px);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>飞机大战</h1>
    <p>方向键 / WASD 移动，空格发射，R 重新开始</p>
    <canvas id="game" width="420" height="720"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const state = {
      keys: {},
      bullets: [],
      enemies: [],
      stars: [],
      score: 0,
      best: Number(localStorage.getItem('plane-war-best') || 0),
      over: false,
      lastShot: 0,
      lastEnemy: 0,
      startTime: performance.now(),
      player: { x: canvas.width / 2, y: canvas.height - 90, w: 28, h: 38, speed: 5, hp: 3 }
    };

    for (let i = 0; i < 90; i++) {
      state.stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: Math.random() * 2, s: 1 + Math.random() * 2 });
    }

    addEventListener('keydown', e => {
      state.keys[e.key.toLowerCase()] = true;
      if (e.key === ' ') e.preventDefault();
      if (state.over && e.key.toLowerCase() === 'r') resetGame();
    });

    addEventListener('keyup', e => state.keys[e.key.toLowerCase()] = false);

    function resetGame() {
      state.bullets = [];
      state.enemies = [];
      state.score = 0;
      state.over = false;
      state.lastShot = 0;
      state.lastEnemy = 0;
      state.startTime = performance.now();
      state.player.x = canvas.width / 2;
      state.player.y = canvas.height - 90;
      state.player.hp = 3;
    }

    function shoot(now) {
      if (now - state.lastShot < 180 || state.over) return;
      state.lastShot = now;
      state.bullets.push({ x: state.player.x, y: state.player.y - 18, w: 4, h: 14, speed: 9 });
    }

    function spawnEnemy(now) {
      const elapsed = (now - state.startTime) / 1000;
      const interval = Math.max(250, 900 - elapsed * 35);
      if (now - state.lastEnemy < interval || state.over) return;
      state.lastEnemy = now;
      const strong = Math.random() < Math.min(0.35, elapsed / 40);
      state.enemies.push({
        x: 25 + Math.random() * (canvas.width - 50),
        y: -30,
        w: strong ? 32 : 26,
        h: strong ? 34 : 28,
        speed: strong ? 2.2 + Math.random() * 1.2 : 3 + Math.random() * 2,
        hp: strong ? 3 : 1,
        maxHp: strong ? 3 : 1,
        strong
      });
    }

    function hit(a, b) {
      return Math.abs(a.x - b.x) < (a.w + b.w) / 2 && Math.abs(a.y - b.y) < (a.h + b.h) / 2;
    }

    function update(now) {
      const p = state.player;
      if (!state.over) {
        if (state.keys['arrowleft'] || state.keys['a']) p.x -= p.speed;
        if (state.keys['arrowright'] || state.keys['d']) p.x += p.speed;
        if (state.keys['arrowup'] || state.keys['w']) p.y -= p.speed;
        if (state.keys['arrowdown'] || state.keys['s']) p.y += p.speed;
        p.x = Math.max(p.w / 2 + 8, Math.min(canvas.width - p.w / 2 - 8, p.x));
        p.y = Math.max(p.h / 2 + 12, Math.min(canvas.height - p.h / 2 - 12, p.y));
        if (state.keys[' ']) shoot(now);
      }

      spawnEnemy(now);

      state.stars.forEach(s => {
        s.y += s.s;
        if (s.y > canvas.height) { s.y = -5; s.x = Math.random() * canvas.width; }
      });

      state.bullets.forEach(b => b.y -= b.speed);
      state.enemies.forEach(e => e.y += e.speed);
      state.bullets = state.bullets.filter(b => b.y > -20);
      state.enemies = state.enemies.filter(e => e.y < canvas.height + 40 && e.hp > 0);

      for (const bullet of state.bullets) {
        for (const enemy of state.enemies) {
          if (enemy.hp > 0 && hit(bullet, enemy)) {
            bullet.y = -100;
            enemy.hp -= 1;
            if (enemy.hp <= 0) state.score += enemy.strong ? 30 : 10;
            break;
          }
        }
      }

      for (const enemy of state.enemies) {
        if (hit(enemy, p) || enemy.y > canvas.height - 30) {
          enemy.hp = 0;
          if (!state.over) {
            p.hp -= 1;
            if (p.hp <= 0) {
              state.over = true;
              state.best = Math.max(state.best, state.score);
              localStorage.setItem('plane-war-best', String(state.best));
            }
          }
        }
      }
    }

    function drawPlane(x, y, color) {
      ctx.save();
      ctx.translate(x, y);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(0, -22);
      ctx.lineTo(14, 18);
      ctx.lineTo(0, 10);
      ctx.lineTo(-14, 18);
      ctx.closePath();
      ctx.fill();
      ctx.fillRect(-22, 2, 44, 8);
      ctx.fillStyle = '#9be7ff';
      ctx.fillRect(-4, -10, 8, 16);
      ctx.restore();
    }

    function drawEnemy(e) {
      ctx.save();
      ctx.translate(e.x, e.y);
      ctx.fillStyle = e.strong ? '#ff6b6b' : '#ff9f43';
      ctx.beginPath();
      ctx.moveTo(0, 18);
      ctx.lineTo(16, -14);
      ctx.lineTo(0, -6);
      ctx.lineTo(-16, -14);
      ctx.closePath();
      ctx.fill();
      ctx.fillRect(-18, -2, 36, 8);
      if (e.maxHp > 1) {
        ctx.fillStyle = 'rgba(255,255,255,.25)';
        ctx.fillRect(-16, -24, 32, 4);
        ctx.fillStyle = '#7bed9f';
        ctx.fillRect(-16, -24, 32 * (e.hp / e.maxHp), 4);
      }
      ctx.restore();
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#ffffff';
      state.stars.forEach(s => {
        ctx.globalAlpha = 0.4 + s.r / 3;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;

      state.bullets.forEach(b => {
        ctx.fillStyle = '#ffe66d';
        ctx.fillRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h);
      });

      state.enemies.forEach(drawEnemy);
      drawPlane(state.player.x, state.player.y, '#4dabf7');

      ctx.fillStyle = 'rgba(8,16,40,.68)';
      ctx.fillRect(12, 12, 150, 76);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 20px sans-serif';
      ctx.fillText('得分 ' + state.score, 24, 40);
      ctx.font = '15px sans-serif';
      ctx.fillText('最高 ' + state.best, 24, 62);
      ctx.fillText('生命 ' + '❤'.repeat(Math.max(0, state.player.hp)), 24, 82);

      if (state.over) {
        ctx.fillStyle = 'rgba(0,0,0,.55)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.font = 'bold 36px sans-serif';
        ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - 20);
        ctx.font = '20px sans-serif';
        ctx.fillText('最终得分：' + state.score, canvas.width / 2, canvas.height / 2 + 20);
        ctx.fillText('按 R 重新开始', canvas.width / 2, canvas.height / 2 + 60);
        ctx.textAlign = 'left';
      }
    }

    function loop(now) {
      update(now);
      render();
      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
