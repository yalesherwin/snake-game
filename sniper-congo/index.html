<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>刚果狙击战 · Congo Sniper</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace;cursor:none;user-select:none}
#game{display:block;width:100vw;height:100vh}
#hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#score{position:absolute;top:18px;left:20px;color:#e8c840;font-size:20px;font-weight:bold;text-shadow:0 0 10px rgba(232,200,64,.6);letter-spacing:3px}
#wind{position:absolute;top:18px;right:20px;color:#7ec8ff;font-size:13px;letter-spacing:1px}
#distance{position:absolute;top:40px;right:20px;color:#7ec8ff;font-size:13px}
#ammo-display{position:absolute;bottom:28px;right:28px;display:flex;gap:6px;align-items:center}
.bullet-dot{width:10px;height:18px;background:#e8c840;border-radius:2px 2px 0 0;transition:background .2s;box-shadow:0 0 6px rgba(232,200,64,.5)}
.bullet-dot.empty{background:#333}
#reload-bar-wrap{position:absolute;bottom:56px;right:28px;width:120px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;display:none}
#reload-bar{height:100%;background:#e8c840;width:0%;border-radius:2px;transition:width .05s}
#breathe-wrap{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);text-align:center}
#breathe-label{color:rgba(255,255,255,.4);font-size:10px;letter-spacing:2px;margin-bottom:4px}
#breathe-bar{width:160px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
#breathe-fill{height:100%;width:100%;border-radius:2px;transition:background .3s}
#kill-msg{position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);font-size:40px;font-weight:900;letter-spacing:6px;display:none;pointer-events:none;z-index:30}
#crosshair{position:fixed;pointer-events:none;z-index:20;transform:translate(-50%,-50%)}
#intro{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#e8c840}
#intro h1{font-size:38px;letter-spacing:8px;margin-bottom:8px;text-shadow:0 0 30px rgba(232,200,64,.6)}
#intro .sub{color:#888;font-size:13px;letter-spacing:3px;margin-bottom:28px}
#intro .row{color:#bbb;font-size:13px;margin:5px 0;letter-spacing:1px}
#intro .key{background:#1a1a1a;border:1px solid #444;padding:2px 8px;border-radius:3px;color:#e8c840;font-size:12px}
#intro .start-btn{margin-top:36px;padding:13px 50px;background:transparent;border:2px solid #e8c840;color:#e8c840;font-size:16px;letter-spacing:5px;cursor:pointer;font-family:'Courier New',monospace;transition:all .3s}
#intro .start-btn:hover{background:#e8c840;color:#000}
#warn{color:#ff6633;font-size:12px;margin-top:18px;letter-spacing:1px}
@keyframes killAnim{0%{opacity:0;transform:translate(-50%,-50%) scale(.6)}40%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}80%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1)}}
</style>
</head>
<body>
<canvas id="game"></canvas>

<!-- Scope crosshair -->
<svg id="crosshair" width="100" height="100" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="38" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1"/>
  <circle cx="50" cy="50" r="38" fill="none" stroke="rgba(0,0,0,.3)" stroke-width="2.5"/>
  <!-- cardinal lines -->
  <line x1="50" y1="4" x2="50" y2="36" stroke="rgba(255,255,255,.7)" stroke-width="1"/>
  <line x1="50" y1="64" x2="50" y2="96" stroke="rgba(255,255,255,.7)" stroke-width="1"/>
  <line x1="4" y1="50" x2="36" y2="50" stroke="rgba(255,255,255,.7)" stroke-width="1"/>
  <line x1="64" y1="50" x2="96" y2="50" stroke="rgba(255,255,255,.7)" stroke-width="1"/>
  <!-- mil dots -->
  <circle cx="50" cy="24" r="1.5" fill="rgba(255,255,255,.6)"/>
  <circle cx="50" cy="76" r="1.5" fill="rgba(255,255,255,.6)"/>
  <circle cx="24" cy="50" r="1.5" fill="rgba(255,255,255,.6)"/>
  <circle cx="76" cy="50" r="1.5" fill="rgba(255,255,255,.6)"/>
  <!-- center dot -->
  <circle cx="50" cy="50" r="2" fill="rgba(255,80,80,.85)"/>
</svg>

<div id="hud">
  <div id="score">KILLS: <span id="kill-count">0</span></div>
  <div id="wind">🌬 WIND: <span id="wind-val">--</span></div>
  <div id="distance">📏 <span id="dist-val">---</span>m</div>
  <div id="ammo-display"></div>
  <div id="reload-bar-wrap"><div id="reload-bar"></div></div>
  <div id="breathe-wrap">
    <div id="breathe-label">BREATH</div>
    <div id="breathe-bar"><div id="breathe-fill"></div></div>
  </div>
  <div id="kill-msg"></div>
</div>

<div id="intro">
  <h1>🎯 CONGO SNIPER</h1>
  <div class="sub">刚果热带雨林 · 巴雷特M82狙击手</div>
  <div class="row">🖱 鼠标移动瞄准 · 左键射击</div>
  <div class="row">按住 <span class="key">SPACE</span> 屏住呼吸（准星稳定）</div>
  <div class="row"><span class="key">R</span> 换弹匣</div>
  <div class="row" style="color:#ff8844;margin-top:10px">⚠ 注意风偏修正 · 距离越远偏差越大</div>
  <button class="start-btn" onclick="startGame()">▶ 进入战区</button>
  <div id="warn">请开启音量 · 巴雷特真实音效</div>
</div>

<script>
// ═══════════════════════════════════════════════
//  AUDIO ENGINE — Barrett M82 realistic sounds
// ═══════════════════════════════════════════════
let audioCtx = null;

function initAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playBarrettShot(){
  if(!audioCtx) return;
  const now = audioCtx.currentTime;

  // ── Layer 1: Body thump (low boom) ──
  const boom = audioCtx.createOscillator();
  const boomGain = audioCtx.createGain();
  const boomFilter = audioCtx.createBiquadFilter();
  boom.type = 'sine';
  boom.frequency.setValueAtTime(60, now);
  boom.frequency.exponentialRampToValueAtTime(30, now+0.18);
  boomFilter.type = 'lowpass';
  boomFilter.frequency.value = 120;
  boomGain.gain.setValueAtTime(0, now);
  boomGain.gain.linearRampToValueAtTime(3.5, now+0.002);
  boomGain.gain.exponentialRampToValueAtTime(0.001, now+0.35);
  boom.connect(boomFilter);
  boomFilter.connect(boomGain);
  boomGain.connect(audioCtx.destination);
  boom.start(now); boom.stop(now+0.4);

  // ── Layer 2: Crack (high transient) ──
  const bufSize = audioCtx.sampleRate * 0.12;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0;i<bufSize;i++){
    const t = i/audioCtx.sampleRate;
    const envelope = Math.exp(-t*80);
    data[i] = (Math.random()*2-1) * envelope * (i<100?i/100:1);
  }
  const crack = audioCtx.createBufferSource();
  crack.buffer = buf;
  const crackFilter = audioCtx.createBiquadFilter();
  crackFilter.type = 'bandpass';
  crackFilter.frequency.value = 2800;
  crackFilter.Q.value = 0.6;
  const crackGain = audioCtx.createGain();
  crackGain.gain.setValueAtTime(2.8, now);
  crackGain.gain.exponentialRampToValueAtTime(0.001, now+0.1);
  crack.connect(crackFilter);
  crackFilter.connect(crackGain);
  crackGain.connect(audioCtx.destination);
  crack.start(now);

  // ── Layer 3: Mid punch ──
  const midBuf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.25, audioCtx.sampleRate);
  const midData = midBuf.getChannelData(0);
  for(let i=0;i<midData.length;i++){
    const t=i/audioCtx.sampleRate;
    midData[i]=(Math.random()*2-1)*Math.exp(-t*28);
  }
  const mid = audioCtx.createBufferSource();
  mid.buffer = midBuf;
  const midFilter = audioCtx.createBiquadFilter();
  midFilter.type = 'bandpass';
  midFilter.frequency.value = 500;
  midFilter.Q.value = 0.4;
  const midGain = audioCtx.createGain();
  midGain.gain.setValueAtTime(1.8, now);
  midGain.gain.exponentialRampToValueAtTime(0.001, now+0.22);
  mid.connect(midFilter);
  midFilter.connect(midGain);
  midGain.connect(audioCtx.destination);
  mid.start(now);

  // ── Layer 4: Tail echo ──
  const echo = audioCtx.createBuffer(1, audioCtx.sampleRate*0.8, audioCtx.sampleRate);
  const echoData = echo.getChannelData(0);
  for(let i=0;i<echoData.length;i++){
    const t=i/audioCtx.sampleRate;
    echoData[i]=(Math.random()*2-1)*Math.exp(-t*5)*0.4;
  }
  const echoSrc = audioCtx.createBufferSource();
  echoSrc.buffer = echo;
  const echoGain = audioCtx.createGain();
  echoGain.gain.setValueAtTime(0.6, now+0.08);
  echoGain.gain.exponentialRampToValueAtTime(0.001, now+0.9);
  const echoFilter = audioCtx.createBiquadFilter();
  echoFilter.type = 'lowpass';
  echoFilter.frequency.value = 800;
  echoSrc.connect(echoFilter);
  echoFilter.connect(echoGain);
  echoGain.connect(audioCtx.destination);
  echoSrc.start(now+0.05);

  // ── Layer 5: Bolt action mechanical click ──
  setTimeout(()=>{
    if(!audioCtx) return;
    const t2 = audioCtx.currentTime;
    const click = audioCtx.createBuffer(1, audioCtx.sampleRate*0.05, audioCtx.sampleRate);
    const cd = click.getChannelData(0);
    for(let i=0;i<cd.length;i++) cd[i]=(Math.random()*2-1)*Math.exp(-i/(audioCtx.sampleRate*0.005));
    const cs = audioCtx.createBufferSource();
    cs.buffer = click;
    const cg = audioCtx.createGain();
    cg.gain.value = 0.4;
    cs.connect(cg);
    cg.connect(audioCtx.destination);
    cs.start(t2);
  }, 600);
}

function playReloadSound(){
  if(!audioCtx) return;
  const now = audioCtx.currentTime;
  // Magazine drop + insert clank
  [0, 0.4, 0.9].forEach((delay, i) => {
    const t = now + delay;
    const b = audioCtx.createBuffer(1, audioCtx.sampleRate*0.06, audioCtx.sampleRate);
    const d = b.getChannelData(0);
    for(let j=0;j<d.length;j++) d[j]=(Math.random()*2-1)*Math.exp(-j/(audioCtx.sampleRate*0.015));
    const src = audioCtx.createBufferSource();
    src.buffer = b;
    const g = audioCtx.createGain();
    g.gain.value = 0.3 + i*0.1;
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'highpass';
    filt.frequency.value = 800 + i*400;
    src.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
    src.start(t);
  });
}

function playImpactSound(){
  if(!audioCtx) return;
  const now = audioCtx.currentTime;
  const b = audioCtx.createBuffer(1, audioCtx.sampleRate*0.15, audioCtx.sampleRate);
  const d = b.getChannelData(0);
  for(let i=0;i<d.length;i++){
    const t=i/audioCtx.sampleRate;
    d[i]=(Math.random()*2-1)*Math.exp(-t*25)*0.5;
  }
  const src = audioCtx.createBufferSource();
  src.buffer = b;
  const g = audioCtx.createGain(); g.gain.value=0.4;
  const f = audioCtx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1200;
  src.connect(f); f.connect(g); g.connect(audioCtx.destination);
  src.start(now);
}

function playDeathScream(){
  if(!audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type='sawtooth';
  osc.frequency.setValueAtTime(320+Math.random()*80, now);
  osc.frequency.linearRampToValueAtTime(180, now+0.4);
  const f = audioCtx.createBiquadFilter();
  f.type='lowpass'; f.frequency.value=1200;
  g.gain.setValueAtTime(0.12, now);
  g.gain.exponentialRampToValueAtTime(0.001, now+0.5);
  osc.connect(f); f.connect(g); g.connect(audioCtx.destination);
  osc.start(now); osc.stop(now+0.5);
}

// ═══════════════════════════════════════════════
//  CANVAS + STATE
// ═══════════════════════════════════════════════
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
resize(); window.addEventListener('resize', resize);

const G = {
  running:false, kills:0, ammo:5, maxAmmo:5,
  reloading:false, reloadProgress:0,
  breathHeld:false, breathLevel:100,
  mouseX:0, mouseY:0, scopeX:0, scopeY:0,
  wind:{x:0,y:0}, windLabel:'',
  time:0, muzzleFlash:0,
  shake:{x:0,y:0,life:0},
  lastShot:0
};

let enemies=[], particles=[], leaves=[], birds=[], fogPatches=[];
let jungleLayers=[];

// ═══════════════════════════════════════════════
//  REALISTIC HUMAN DRAWING
// ═══════════════════════════════════════════════
function drawHuman(x, y, scale, alpha, state, hitFlash, isCommander){
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  const skin = hitFlash>0 ? '#ff5555' : '#8B6914';
  const uniform = hitFlash>0 ? '#ff4444' : (isCommander?'#3d5a1e':'#2d4a14');
  const shadow = 'rgba(0,0,0,0.4)';

  if(state==='prone' || state==='moving'){
    // Prone soldier
    ctx.save();

    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(0, 8, 28, 5, 0, 0, Math.PI*2);
    ctx.fill();

    // Body torso (prone)
    ctx.fillStyle=uniform;
    ctx.beginPath();
    ctx.roundRect(-18, -5, 36, 14, 3);
    ctx.fill();

    // Legs
    ctx.fillStyle=uniform;
    ctx.beginPath();
    ctx.roundRect(12, 0, 18, 8, 2);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(12, 6, 16, 7, 2);
    ctx.fill();
    // boots
    ctx.fillStyle='#1a1a1a';
    ctx.beginPath();
    ctx.roundRect(28, 0, 8, 7, 1);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(26, 6, 8, 7, 1);
    ctx.fill();

    // Arms holding rifle
    ctx.fillStyle=uniform;
    ctx.beginPath();
    ctx.roundRect(-22, -2, 12, 7, 2);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(-26, 1, 8, 6, 2);
    ctx.fill();

    // Hands
    ctx.fillStyle=skin;
    ctx.beginPath();
    ctx.arc(-26, 4, 4, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(-16, 2, 3.5, 0, Math.PI*2);
    ctx.fill();

    // Rifle - Barrett M82
    ctx.fillStyle='#111';
    // Stock
    ctx.beginPath();
    ctx.roundRect(-10, -4, 8, 5, 1);
    ctx.fill();
    // Receiver/body
    ctx.fillStyle='#1a1a1a';
    ctx.beginPath();
    ctx.roundRect(-18, -5, 22, 5, 1);
    ctx.fill();
    // Barrel (long)
    ctx.fillStyle='#0d0d0d';
    ctx.beginPath();
    ctx.roundRect(-36, -4, 20, 3, 1);
    ctx.fill();
    // Muzzle brake
    ctx.fillStyle='#333';
    ctx.beginPath();
    ctx.roundRect(-40, -5, 5, 5, 1);
    ctx.fill();
    // Scope
    ctx.fillStyle='#222';
    ctx.beginPath();
    ctx.roundRect(-14, -9, 14, 4, 1);
    ctx.fill();
    ctx.fillStyle='rgba(100,180,255,0.3)';
    ctx.beginPath();
    ctx.roundRect(-13, -8, 12, 2, 1);
    ctx.fill();
    // Bipod
    ctx.strokeStyle='#333'; ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(-32,-2); ctx.lineTo(-35,6);
    ctx.moveTo(-28,-2); ctx.lineTo(-25,6);
    ctx.stroke();

    // Head (peeking)
    // Neck
    ctx.fillStyle=skin;
    ctx.beginPath();
    ctx.roundRect(-7, -12, 6, 9, 2);
    ctx.fill();
    // Head
    ctx.fillStyle=skin;
    ctx.beginPath();
    ctx.ellipse(-5, -16, 8, 9, -0.2, 0, Math.PI*2);
    ctx.fill();
    // Face details
    ctx.fillStyle='rgba(0,0,0,0.5)';
    // Eye
    ctx.beginPath();
    ctx.ellipse(-8, -17, 2.5, 1.5, 0, 0, Math.PI*2);
    ctx.fill();
    // Mouth
    ctx.beginPath();
    ctx.arc(-5,-14,2,0,Math.PI);
    ctx.fill();

    // Helmet
    ctx.fillStyle=isCommander?'#4a6a24':'#1c2e10';
    ctx.beginPath();
    ctx.ellipse(-5, -21, 9, 6, -0.1, Math.PI, 0);
    ctx.fill();
    // Helmet cover texture
    ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=0.5;
    for(let i=0;i<3;i++){
      ctx.beginPath();
      ctx.arc(-5,-21, 6+i, Math.PI+0.3, Math.PI*2-0.3);
      ctx.stroke();
    }
    if(isCommander){
      // Commander rank insignia
      ctx.fillStyle='#e8c840';
      ctx.beginPath();
      ctx.arc(-5,-23,2,0,Math.PI*2);
      ctx.fill();
    }
    // Camo face paint
    ctx.fillStyle='rgba(30,50,20,0.4)';
    ctx.beginPath();
    ctx.ellipse(-5,-16,5,4,0,0,Math.PI*2);
    ctx.fill();

    // Gear/vest
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.roundRect(-15,-3,12,8,2);
    ctx.fill();
    // Pouches
    for(let i=0;i<3;i++){
      ctx.fillStyle='#1a2e08';
      ctx.beginPath();
      ctx.roundRect(-14+i*4,-2,3,5,1);
      ctx.fill();
    }

    ctx.restore();
  } else {
    // Crouching / peek state
    ctx.save();

    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(0, 20, 16, 4, 0, 0, Math.PI*2);
    ctx.fill();

    // Legs crouching
    ctx.fillStyle=uniform;
    ctx.beginPath();
    ctx.roundRect(-10, 6, 9, 16, 2);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(1, 6, 9, 16, 2);
    ctx.fill();
    // Feet
    ctx.fillStyle='#111';
    ctx.beginPath();
    ctx.roundRect(-13, 18, 10, 5, 1);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(3, 18, 10, 5, 1);
    ctx.fill();
    // Knees
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.arc(-5,14,4,0,Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(5,14,4,0,Math.PI*2);
    ctx.fill();

    // Torso
    ctx.fillStyle=uniform;
    ctx.beginPath();
    ctx.roundRect(-11, -8, 22, 16, 3);
    ctx.fill();
    // Tactical vest
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.roundRect(-9,-6,18,14,2);
    ctx.fill();
    for(let i=0;i<2;i++){
      ctx.fillStyle='#1a2e08';
      ctx.beginPath();
      ctx.roundRect(-7+i*7,-4,5,8,1);
      ctx.fill();
    }

    // Right arm + rifle
    ctx.fillStyle=uniform;
    ctx.beginPath();
    ctx.roundRect(9,-5,8,12,2);
    ctx.fill();
    ctx.fillStyle=skin;
    ctx.beginPath();
    ctx.arc(13,7,4,0,Math.PI*2);
    ctx.fill();

    // Left arm
    ctx.fillStyle=uniform;
    ctx.beginPath();
    ctx.roundRect(-17,-5,10,12,2);
    ctx.fill();
    ctx.fillStyle=skin;
    ctx.beginPath();
    ctx.arc(-13,7,3.5,0,Math.PI*2);
    ctx.fill();

    // Barrett M82 held vertically/diagonal
    ctx.save();
    ctx.rotate(-0.3);
    ctx.fillStyle='#111';
    ctx.beginPath();
    ctx.roundRect(10,-28,5,32,1);
    ctx.fill();
    ctx.fillStyle='#1a1a1a';
    ctx.beginPath();
    ctx.roundRect(9,-28,7,10,1);
    ctx.fill();
    ctx.fillStyle='#0d0d0d';
    ctx.beginPath();
    ctx.roundRect(11,-36,3,10,1);
    ctx.fill();
    ctx.fillStyle='#333';
    ctx.beginPath();
    ctx.roundRect(10,-40,5,5,1);
    ctx.fill();
    ctx.fillStyle='#222';
    ctx.beginPath();
    ctx.roundRect(6,-22,12,4,1);
    ctx.fill();
    ctx.fillStyle='rgba(100,180,255,0.3)';
    ctx.beginPath();
    ctx.roundRect(7,-21,10,2,1);
    ctx.fill();
    ctx.restore();

    // Neck
    ctx.fillStyle=skin;
    ctx.beginPath();
    ctx.roundRect(-4,-12,8,6,2);
    ctx.fill();

    // Head
    ctx.fillStyle=skin;
    ctx.beginPath();
    ctx.ellipse(0,-19,9,11,0,0,Math.PI*2);
    ctx.fill();

    // Face
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.beginPath();
    ctx.ellipse(-3,-20,2.5,2,0,0,Math.PI*2); // left eye
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(3,-20,2.5,2,0,0,Math.PI*2); // right eye
    ctx.fill();
    // pupils
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.arc(-2.5,-20,1,0,Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(3.5,-20,1,0,Math.PI*2);
    ctx.fill();

    // Camo face paint
    ctx.fillStyle='rgba(30,60,10,0.5)';
    ctx.beginPath();
    ctx.ellipse(-1,-18,7,6,0,0,Math.PI*2);
    ctx.fill();

    // Helmet
    ctx.fillStyle=isCommander?'#4a6a24':'#1c2e10';
    ctx.beginPath();
    ctx.ellipse(0,-26,10,7,0,Math.PI,0);
    ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.ellipse(0,-26,10,7,0,Math.PI,0);
    ctx.fill();
    ctx.fillStyle=isCommander?'#3a5a1e':'#162508';
    ctx.beginPath();
    ctx.ellipse(0,-23,10,4,0,Math.PI,0);
    ctx.fill();

    if(isCommander){
      ctx.fillStyle='#e8c840';
      ctx.beginPath();
      ctx.arc(0,-28,2.5,0,Math.PI*2);
      ctx.fill();
      ctx.strokeStyle='#c8a030';
      ctx.lineWidth=0.8;
      ctx.beginPath();
      ctx.arc(0,-28,4,0,Math.PI*2);
      ctx.stroke();
    }

    ctx.restore();
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════
//  ENEMY CLASS
// ═══════════════════════════════════════════════
class Enemy {
  constructor(){
    this.reset();
  }
  reset(){
    this.alive = true;
    this.x = W*0.12 + Math.random()*W*0.76;
    this.y = H*(0.44 + Math.random()*0.16);
    this.distance = 280 + Math.random()*580;
    this.scale = Math.max(0.18, 0.55 - this.distance/1200);
    this.drawState = Math.random()<0.5 ? 'prone' : 'crouch';
    this.alpha = 0;
    this.hitFlash = 0;
    this.phase = 'hidden';
    this.phaseTimer = 80+Math.random()*200;
    this.targetX = this.x;
    this.isCommander = Math.random()<0.22;
    this.moveTimer = 0;
  }
  update(){
    this.phaseTimer--;
    if(this.phaseTimer<=0){
      const r = Math.random();
      if(this.phase==='hidden'){
        this.phase = r<0.4?'peek':r<0.75?'exposed':'moving';
        this.phaseTimer = this.phase==='peek'?30+Math.random()*60:this.phase==='exposed'?50+Math.random()*130:40+Math.random()*80;
      } else if(this.phase==='peek'){
        this.phase = r<0.5?'exposed':'hidden';
        this.phaseTimer = 60+Math.random()*160;
      } else if(this.phase==='exposed'){
        this.phase='hidden';
        this.phaseTimer=100+Math.random()*220;
      } else if(this.phase==='moving'){
        this.targetX = W*0.1 + Math.random()*W*0.8;
        this.phase='hidden';
        this.phaseTimer=120+Math.random()*240;
        this.drawState = Math.random()<0.5?'prone':'crouch';
      }
    }
    this.x += (this.targetX-this.x)*0.04;
    const tgt = this.phase==='hidden'?0:(this.phase==='peek'?0.45:0.88);
    this.alpha += (tgt-this.alpha)*0.05;
    if(this.hitFlash>0) this.hitFlash--;
  }
  draw(){
    if(this.alpha<0.015) return;
    drawHuman(this.x, this.y, this.scale, this.alpha, this.drawState, this.hitFlash, this.isCommander);
  }
  hitBox(){
    const s = this.scale;
    return {x:this.x-s*20, y:this.y-s*35, w:s*40, h:s*45};
  }
}

// ═══════════════════════════════════════════════
//  ENVIRONMENT GENERATION
// ═══════════════════════════════════════════════
function genJungle(){
  jungleLayers = [];
  for(let l=0;l<7;l++){
    const trees=[];
    const n = 6+l*2;
    const baseY = H*(0.38+l*0.05);
    for(let i=0;i<n;i++){
      trees.push({
        x: (i/n)*W*1.4-W*0.15+Math.random()*100,
        baseY,
        h: 150+Math.random()*220-l*15,
        w: 28+Math.random()*55,
        g: 55+Math.random()*70-l*7,
        r: 10+Math.random()*20,
        b: 5+Math.random()*15,
        sp: Math.random()*Math.PI*2,
        sa: 0.4+Math.random()*1.2,
        vines: Array.from({length:3+Math.floor(Math.random()*4)},()=>({x:(Math.random()-.5)*30,len:40+Math.random()*80,sp:Math.random()*Math.PI*2}))
      });
    }
    jungleLayers.push({trees,depth:l+1});
  }
  fogPatches=[];
  for(let i=0;i<14;i++){
    fogPatches.push({x:Math.random()*W,y:H*(0.52+Math.random()*0.22),w:180+Math.random()*350,h:25+Math.random()*55,a:0.025+Math.random()*0.07,spd:(Math.random()-.5)*.25});
  }
}

function genLeaves(){
  leaves=[];
  for(let i=0;i<70;i++) leaves.push(newLeaf(true));
}
function newLeaf(rand){
  return {x:rand?Math.random()*W:-10,y:rand?Math.random()*H*0.75:-10,vx:(Math.random()-.5)*1.2,vy:0.25+Math.random()*.7,rot:Math.random()*Math.PI*2,vr:(Math.random()-.5)*.04,sz:3+Math.random()*9,a:.35+Math.random()*.55,c:`hsl(${95+Math.floor(Math.random()*45)},${45+Math.floor(Math.random()*35)}%,${18+Math.floor(Math.random()*28)}%)`};
}
function genBirds(){
  birds=[];
  for(let i=0;i<6;i++) birds.push({x:Math.random()*W,y:H*.08+Math.random()*H*.22,vx:(0.4+Math.random())*(Math.random()<.5?1:-1),fp:Math.random()*Math.PI*2,sz:2.5+Math.random()*4.5,a:.3+Math.random()*.4});
}
function spawnEnemies(){
  enemies=[];
  for(let i=0;i<7;i++){
    const e=new Enemy();
    e.phaseTimer=40+i*35+Math.random()*120;
    enemies.push(e);
  }
}
function updateWind(){
  const dirs=['N','NE','E','SE','S','SW','W','NW'];
  const dir=dirs[Math.floor(Math.random()*8)];
  const spd=(0.8+Math.random()*4.5).toFixed(1);
  const ang=dirs.indexOf(dir)*Math.PI/4;
  G.wind.x=Math.sin(ang)*parseFloat(spd)*.45;
  G.wind.y=Math.cos(ang)*parseFloat(spd)*.18;
  G.windLabel=`${spd}m/s ${dir}`;
  document.getElementById('wind-val').textContent=G.windLabel;
}

// ═══════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════
function spawnBlood(x,y){
  for(let i=0;i<28;i++){
    const a=Math.random()*Math.PI*2;
    const s=0.8+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2.5,life:35+Math.random()*25,ml:60,c:i<18?'#aa0000':i<24?'#cc2200':'#ff4400',sz:1.5+Math.random()*3.5});
  }
}
function spawnMuzzle(){
  const mx=W*.5, my=H*.88;
  for(let i=0;i<20;i++){
    const a=-Math.PI/2+(Math.random()-.5)*.6;
    const s=4+Math.random()*8;
    particles.push({x:mx,y:my,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:12+Math.random()*8,ml:20,c:`hsl(${35+Math.random()*25},100%,${55+Math.random()*35}%)`,sz:2+Math.random()*5});
  }
  // Smoke
  for(let i=0;i<8;i++){
    const a=-Math.PI/2+(Math.random()-.5)*.4;
    const s=1+Math.random()*3;
    particles.push({x:mx,y:my,vx:Math.cos(a)*s+G.wind.x*.2,vy:Math.sin(a)*s,life:40+Math.random()*30,ml:70,c:`rgba(180,180,180,0.6)`,sz:4+Math.random()*8,smoke:true});
  }
}
function spawnImpact(x,y){
  for(let i=0;i<14;i++){
    const a=Math.random()*Math.PI*2;
    particles.push({x,y,vx:Math.cos(a)*(1+Math.random()*3.5),vy:Math.sin(a)*(1+Math.random()*3.5)-1,life:18+Math.random()*22,ml:40,c:i<8?'#8a7060':'#aaa',sz:1+Math.random()*2.5});
  }
}

// ═══════════════════════════════════════════════
//  DRAWING
// ═══════════════════════════════════════════════
function drawSky(){
  const g=ctx.createLinearGradient(0,0,0,H*.5);
  g.addColorStop(0,'#0d1a06');
  g.addColorStop(.3,'#1a2e0a');
  g.addColorStop(.6,'#253b10');
  g.addColorStop(1,'#1c2e0c');
  ctx.fillStyle=g;
  ctx.fillRect(0,0,W,H);
  // Sunshafts
  ctx.save();
  ctx.globalAlpha=.04;
  ctx.fillStyle='#e8d880';
  for(let i=0;i<6;i++){
    const rx=W*(.1+i*.16);
    ctx.beginPath();
    ctx.moveTo(rx,0);
    ctx.lineTo(rx-80,H*.8);
    ctx.lineTo(rx+80,H*.8);
    ctx.fill();
  }
  ctx.restore();
}

function drawGround(){
  const g=ctx.createLinearGradient(0,H*.58,0,H);
  g.addColorStop(0,'#0f1a05');
  g.addColorStop(.4,'#080f02');
  g.addColorStop(1,'#030602');
  ctx.fillStyle=g;
  ctx.fillRect(0,H*.58,W,H*.42);
  // Ground details
  ctx.save();
  ctx.globalAlpha=.25;
  for(let i=0;i<25;i++){
    ctx.fillStyle=`hsl(${85+Math.random()*25},${25+Math.random()*20}%,${6+Math.random()*8}%)`;
    ctx.fillRect(Math.random()*W,H*.58+Math.random()*H*.38,25+Math.random()*100,2+Math.random()*5);
  }
  ctx.restore();
}

function drawTree(tr, depth, t){
  const sway=Math.sin(t*.0008*depth+tr.sp)*tr.sa;
  ctx.save();
  ctx.translate(tr.x+sway, tr.baseY);
  // Roots
  ctx.strokeStyle=`rgb(${tr.r},${(tr.g*.3)|0},${tr.b})`;
  ctx.lineWidth=3;
  for(let i=0;i<3;i++){
    const rx=(i-.5)*tr.w*.4;
    ctx.beginPath();
    ctx.moveTo(rx*.5,0);
    ctx.quadraticCurveTo(rx,10,rx*1.5,22);
    ctx.stroke();
  }
  // Trunk
  const tw=tr.w*.13;
  const tg=ctx.createLinearGradient(-tw,0,tw,0);
  tg.addColorStop(0,`rgb(${tr.r},${(tr.g*.3)|0},${tr.b})`);
  tg.addColorStop(.4,`rgb(${tr.r+8},${(tr.g*.45)|0},${tr.b+3})`);
  tg.addColorStop(1,`rgb(${tr.r},${(tr.g*.25)|0},${tr.b})`);
  ctx.fillStyle=tg;
  ctx.beginPath();
  ctx.moveTo(-tw,0);
  ctx.quadraticCurveTo(-tw*.5,-tr.h*.5,-tw*.3,-tr.h);
  ctx.lineTo(tw*.3,-tr.h);
  ctx.quadraticCurveTo(tw*.5,-tr.h*.5,tw,0);
  ctx.fill();
  // Vines
  ctx.save();
  ctx.strokeStyle=`rgba(${tr.r+5},${(tr.g*.6)|0},${tr.b+2},0.6)`;
  ctx.lineWidth=1.2;
  tr.vines.forEach(v=>{
    const vs=Math.sin(t*.0006+v.sp)*3;
    ctx.beginPath();
    ctx.moveTo(v.x,-tr.h*.3);
    for(let s=0;s<=v.len;s+=6){
      ctx.lineTo(v.x+Math.sin(s*.2+vs)*8, -tr.h*.3+s);
    }
    ctx.stroke();
  });
  ctx.restore();
  // Canopy
  for(let i=0;i<4;i++){
    const lh=tr.h*(.6-i*.1);
    const lw=tr.w*(1.3-i*.2);
    const lg=ctx.createRadialGradient(0,-lh*.25,0,0,-lh*.25,lw*.65);
    lg.addColorStop(0,`rgb(${tr.r+15},${Math.min(255,tr.g+30-i*18)},${tr.b+8})`);
    lg.addColorStop(.6,`rgb(${tr.r+5},${Math.max(12,tr.g+8-i*14)},${tr.b+3})`);
    lg.addColorStop(1,`rgb(${tr.r},${Math.max(8,tr.g-25-i*10)},${tr.b})`);
    ctx.fillStyle=lg;
    ctx.beginPath();
    ctx.ellipse(0,-lh,lw*.52,lh*.48,0,0,Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawFog(t){
  fogPatches.forEach(f=>{
    f.x+=f.spd;
    if(f.x>W+f.w)f.x=-f.w;
    if(f.x<-f.w)f.x=W+f.w;
    ctx.save();
    const fg=ctx.createRadialGradient(f.x+f.w/2,f.y+f.h/2,0,f.x+f.w/2,f.y+f.h/2,f.w*.55);
    fg.addColorStop(0,`rgba(160,210,140,${f.a})`);
    fg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=fg;
    ctx.fillRect(f.x,f.y-f.h*.5,f.w,f.h*2);
    ctx.restore();
  });
}

function drawLeaves(t){
  leaves.forEach((l,i)=>{
    l.x+=l.vx+G.wind.x*.25;
    l.y+=l.vy;
    l.rot+=l.vr;
    if(l.y>H||l.x<-20||l.x>W+20) leaves[i]=newLeaf(false);
    ctx.save();
    ctx.globalAlpha=l.a;
    ctx.translate(l.x,l.y);
    ctx.rotate(l.rot);
    ctx.fillStyle=l.c;
    ctx.beginPath();
    ctx.ellipse(0,0,l.sz,l.sz*.4,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

function drawBirds(t){
  birds.forEach(b=>{
    b.x+=b.vx; b.fp+=.12;
    if(b.x>W+50)b.x=-50; if(b.x<-50)b.x=W+50;
    const fl=Math.sin(b.fp)*b.sz*1.3;
    ctx.save();
    ctx.globalAlpha=b.a;
    ctx.strokeStyle='rgba(40,40,30,0.7)';
    ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(b.x-b.sz,b.y+fl);
    ctx.quadraticCurveTo(b.x,b.y,b.x+b.sz,b.y+fl);
    ctx.stroke();
    ctx.restore();
  });
}

function drawParticles(){
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.12; p.life--;
    if(p.smoke){p.sz*=1.01;p.vx+=G.wind.x*.05;}
    ctx.save();
    ctx.globalAlpha=Math.max(0,p.life/p.ml)*(p.smoke?.5:1);
    ctx.fillStyle=p.c;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
  for(let i=particles.length-1;i>=0;i--) if(particles[i].life<=0)particles.splice(i,1);
}

function drawScope(cx,cy){
  ctx.save();
  const vg=ctx.createRadialGradient(cx,cy,H*.18,cx,cy,H*.52);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(.55,'rgba(0,0,0,.25)');
  vg.addColorStop(.8,'rgba(0,0,0,.75)');
  vg.addColorStop(1,'rgba(0,0,0,.98)');
  ctx.fillStyle=vg;
  ctx.fillRect(0,0,W,H);
  ctx.restore();
}

function drawMuzzleFlash(mag){
  if(mag<=0) return;
  const cx=W*.5, cy=H*.88;
  ctx.save();
  ctx.globalAlpha=mag/8;
  const fg=ctx.createRadialGradient(cx,cy,0,cx,cy,90);
  fg.addColorStop(0,'rgba(255,230,80,1)');
  fg.addColorStop(.3,'rgba(255,140,20,.8)');
  fg.addColorStop(1,'rgba(255,60,0,0)');
  ctx.fillStyle=fg;
  ctx.beginPath();
  ctx.arc(cx,cy,90,0,Math.PI*2);
  ctx.fill();
  // Flash shockwave
  ctx.globalAlpha=mag/16;
  ctx.strokeStyle='rgba(255,200,60,.5)';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.arc(cx,cy,110-(G.muzzleFlash/8)*40,0,Math.PI*2);
  ctx.stroke();
  ctx.restore();
}

function updateAmmoUI(){
  const d=document.getElementById('ammo-display');
  d.innerHTML='';
  for(let i=0;i<G.maxAmmo;i++){
    const dot=document.createElement('div');
    dot.className='bullet-dot'+(i>=G.ammo?' empty':'');
    d.appendChild(dot);
  }
}

// ═══════════════════════════════════════════════
//  SHOOTING
// ═══════════════════════════════════════════════
function shoot(sx,sy){
  if(G.reloading||G.ammo<=0||G.time-G.lastShot<15) return;
  G.lastShot=G.time;
  G.ammo--;
  updateAmmoUI();
  G.muzzleFlash=8;
  G.shake={x:(Math.random()-.5)*18,y:(Math.random()-.5)*12,life:10};
  playBarrettShot();
  spawnMuzzle();
  // Wind + breath compensation
  const wdx=G.wind.x*4, wdy=G.wind.y*4;
  const breathErr=G.breathHeld?0:20;
  const hx=sx+wdx+(Math.random()-.5)*breathErr;
  const hy=sy+wdy+(Math.random()-.5)*breathErr;
  let hit=false;
  enemies.forEach(e=>{
    if(!e.alive||e.alpha<0.25) return;
    const b=e.hitBox();
    if(hx>=b.x&&hx<=b.x+b.w&&hy>=b.y&&hy<=b.y+b.h){
      e.alive=false; hit=true;
      G.kills++;
      document.getElementById('kill-count').textContent=G.kills;
      spawnBlood(e.x,e.y);
      playDeathScream();
      showKill(e.isCommander);
      setTimeout(()=>{ const ne=new Enemy(); enemies[enemies.indexOf(e)]=ne; },4000);
    }
  });
  if(!hit){spawnImpact(hx,hy); playImpactSound();}
  if(G.ammo<=0){
    G.reloading=true;
    G.reloadProgress=0;
    document.getElementById('reload-bar-wrap').style.display='block';
    playReloadSound();
  }
}

function showKill(cmd){
  const el=document.getElementById('kill-msg');
  el.textContent=cmd?'⭐ COMMANDER DOWN':'ELIMINATED';
  el.style.color=cmd?'#e8c840':'#ff3322';
  el.style.textShadow=cmd?'0 0 30px #e8c840':'0 0 30px #ff0000';
  el.style.display='block';
  el.style.animation='killAnim 1.1s ease-out forwards';
  setTimeout(()=>{el.style.display='none';el.style.animation='';},1100);
}

// ═══════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════
function loop(){
  if(!G.running){requestAnimationFrame(loop);return;}
  G.time++;
  const t=G.time;

  // Breath
  if(G.breathHeld){G.breathLevel=Math.max(0,G.breathLevel-.7);if(G.breathLevel<=0)G.breathHeld=false;}
  else G.breathLevel=Math.min(100,G.breathLevel+.38);
  const bf=document.getElementById('breathe-fill');
  bf.style.width=G.breathLevel+'%';
  bf.style.background=G.breathLevel>60?'#00e888':G.breathLevel>30?'#e8c840':'#ff4433';

  // Reload progress
  if(G.reloading){
    G.reloadProgress=Math.min(100,G.reloadProgress+1.6);
    document.getElementById('reload-bar').style.width=G.reloadProgress+'%';
    if(G.reloadProgress>=100){
      G.reloading=false;G.ammo=G.maxAmmo;
      updateAmmoUI();
      document.getElementById('reload-bar-wrap').style.display='none';
    }
  }

  // Wind
  if(t%600===0) updateWind();

  // Screen shake
  let sx=0,sy=0;
  if(G.shake.life>0){sx=G.shake.x*(G.shake.life/10);sy=G.shake.y*(G.shake.life/10);G.shake.life--;}

  ctx.save();
  ctx.translate(sx,sy);
  drawSky();
  drawGround();
  jungleLayers.forEach((l,li)=>{
    ctx.save();
    ctx.globalAlpha=.55+li*.07;
    l.trees.forEach(tr=>drawTree(tr,l.depth,t));
    ctx.restore();
  });
  drawFog(t);
  drawBirds(t);
  drawLeaves(t);
  enemies.forEach(e=>{e.update();e.draw();});
  drawParticles();
  drawMuzzleFlash(G.muzzleFlash);
  if(G.muzzleFlash>0) G.muzzleFlash--;
  ctx.restore();

  // Crosshair wobble
  let bx=0,by=0;
  if(!G.breathHeld){
    const ot=t*.018;
    bx=Math.sin(ot)*7+Math.sin(ot*1.9)*3+(Math.random()-.5)*1.5;
    by=Math.cos(ot*.8)*5+Math.sin(ot*2.3)*2.5+(Math.random()-.5)*1.5;
  } else {bx=(Math.random()-.5)*.8;by=(Math.random()-.5)*.8;}
  G.scopeX=G.mouseX+bx;
  G.scopeY=G.mouseY+by;
  drawScope(G.scopeX,G.scopeY);
  const ch=document.getElementById('crosshair');
  ch.style.left=G.scopeX+'px';
  ch.style.top=G.scopeY+'px';

  // Nearest enemy distance
  let minD=Infinity;
  enemies.forEach(e=>{if(e.alive&&e.alpha>.25)minD=Math.min(minD,e.distance);});
  document.getElementById('dist-val').textContent=minD===Infinity?'---':Math.round(minD);

  requestAnimationFrame(loop);
}

canvas.addEventListener('mousemove',e=>{G.mouseX=e.clientX;G.mouseY=e.clientY;});
canvas.addEventListener('click',e=>{if(G.running)shoot(G.scopeX,G.scopeY);});
canvas.addEventListener('contextmenu',e=>e.preventDefault());
window.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();G.breathHeld=true;}
  if(e.code==='KeyR'&&!G.reloading&&G.ammo<G.maxAmmo){G.reloading=true;G.reloadProgress=0;document.getElementById('reload-bar-wrap').style.display='block';playReloadSound();}
});
window.addEventListener('keyup',e=>{if(e.code==='Space')G.breathHeld=false;});
canvas.addEventListener('touchmove',e=>{e.preventDefault();G.mouseX=e.touches[0].clientX;G.mouseY=e.touches[0].clientY;},{passive:false});
canvas.addEventListener('touchstart',e=>{G.mouseX=e.touches[0].clientX;G.mouseY=e.touches[0].clientY;if(G.running)shoot(G.scopeX,G.scopeY);});

// ═══════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════
function startGame(){
  initAudio();
  document.getElementById('intro').style.display='none';
  G.running=true;
  genJungle(); genLeaves(); genBirds(); spawnEnemies(); updateWind(); updateAmmoUI();
}
requestAnimationFrame(loop);
</script>
